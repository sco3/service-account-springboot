services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: service-account-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./docker/clickhouse-init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: service_accounts
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: service-account-keycloak
    command: 
      - start-dev
      - --import-realm
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./docker/keycloak/realm.json:/opt/keycloak/data/import/realm.json
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /realms/service-accounts HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && timeout 2 head -1 <&3 | grep -q 200'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  clickhouse-data:
  keycloak-data:
