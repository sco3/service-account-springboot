name: Test Keycloak Token

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-keycloak-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Start Keycloak and ClickHouse
        run: docker compose up -d keycloak clickhouse

      - name: Wait for ClickHouse
        run: |
          echo "Waiting for ClickHouse..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8123/ping > /dev/null 2>&1; then
              echo "ClickHouse ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ClickHouse failed to start"
          docker compose logs clickhouse
          exit 1

      - name: Wait for Keycloak
        run: |
          echo "Waiting for Keycloak..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/realms/service-accounts/.well-known/openid-configuration > /dev/null 2>&1; then
              echo "Keycloak ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Keycloak failed to start"
          docker compose logs keycloak
          exit 1

      - name: Get token
        run: |
          RESPONSE=$(bash integraion/get-token.sh 2>/dev/null)
          echo "$RESPONSE" | python3 -m json.tool

          if echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if 'access_token' in d else 1)"; then
            echo "Token obtained successfully"
          else
            echo "Failed to obtain token"
            exit 1
          fi

      - name: Verify token claims
        run: |
          TOKEN=$(bash integraion/get-token.sh 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | python3 -c "import sys,base64,json; s=sys.stdin.read().strip().rstrip('='); s+='='*(4-len(s)%4); print(json.dumps(json.loads(base64.urlsafe_b64decode(s)),indent=2))")

          echo "Token payload:"
          echo "$PAYLOAD" | python3 -m json.tool

          echo "$PAYLOAD" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['realm_access']['roles'] == ['admin'], f'Expected admin role, got {d[\"realm_access\"][\"roles\"]}'
          assert d['email_verified'] == True, 'Email should be verified'
          print('All claims verified')
          "

      - name: Check all service ports
        run: |
          echo "Checking service ports..."
          for PORT in 8123 8081; do
            if netstat -ltnp 2>/dev/null | grep -q ":${PORT} "; then
              echo "  [OK] Port ${PORT} is listening"
            else
              echo "  [FAIL] Port ${PORT} is NOT listening"
              exit 1
            fi
          done
          echo "All ports OK."

      - name: Start Spring Boot app
        run: |
          nohup ./gradlew bootRun > app.log 2>&1 &
          echo "Waiting for Spring Boot app..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "App ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start"
          cat app.log
          exit 1

      - name: Test get-users returns 400 without params
        run: |
          RESPONSE=$(bash ./get-users-no-param.sh 2>/dev/null)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" -ne 400 ]; then
            echo "Expected HTTP 400, got $HTTP_CODE"
            exit 1
          fi
          echo "Correctly returned 400"
        working-directory: integraion

      - name: Test health/me endpoint
        run: |
          RESPONSE=$(bash ./get-health-me.sh 2>/dev/null)
          echo "Response:"
          echo "$RESPONSE" | python3 -m json.tool

          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'subject' in d, 'Missing subject claim'
          assert d.get('roles') == ['admin'] or d.get('realm_access', {}).get('roles') == ['admin'], 'Expected admin role'
          print('Health/me endpoint verified')
          "
        working-directory: integraion

      - name: Cleanup
        if: always()
        run: docker compose down -v
